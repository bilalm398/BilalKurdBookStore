<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kurdish BookStore</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            background: linear-gradient(to bottom, #fffbeb, #fef3c7); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-direction: column;
        }
        a { text-decoration: none; color: #d97706; }
        a:hover { text-decoration: underline; }

        .login-container {
            background: white; 
            padding: 2.5rem; 
            border-radius: 1rem; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px;
        }

        .header { text-align: center; margin-bottom: 1.5rem; }
        .header .icon { font-size: 3rem; }
        .header h2 { color: #1f2937; margin-top: 0.5rem; }
        .header p { color: #6b7280; font-size: 0.9rem; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; color: #4b5563; font-weight: 500; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1rem; }
        .form-group input:focus { outline: none; border-color: #d97706; box-shadow: 0 0 0 3px rgba(217,119,6,0.2); }
        
        .form-row { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 1.5rem; }
        
        .btn-submit { 
            width: 100%; padding: 0.75rem; background: #d97706; color: white; 
            border: none; border-radius: 0.5rem; font-size: 1rem; font-weight: bold; 
            cursor: pointer; transition: 0.3s; 
        }
        .btn-submit:hover { background: #b45309; }

        .back-link { margin-bottom: 1.5rem; font-weight: 500; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← Back to Home</a>

    <div class="login-container">
        <div class="header">
            <div class="icon">📚</div>
            <h2>Welcome Back!</h2>
            <p>Please enter your details to sign in.</p>
        </div>

        <form action="index.html">
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password" required>
            </div>
            <div class="form-row">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot password?</a>
            </div>
            <button type="submit" class="btn-submit">Sign In</button>
            <br>
            <p>do not have account   <a href="register.html">register</a>  it</p>
          
        </form>
    </div>

</body>
</html>
