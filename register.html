<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Kurdish BookStore</title>
    <style>
        /* Shared Styles with Login */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            background: linear-gradient(to bottom, #fffbeb, #fef3c7); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-direction: column;
            padding: 20px;
        }
        a { text-decoration: none; color: #d97706; font-weight: 500; }
        a:hover { text-decoration: underline; }

        .auth-container {
            background: white; 
            padding: 2.5rem; 
            border-radius: 1rem; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 450px;
        }

        .header { text-align: center; margin-bottom: 1.5rem; }
        .header .icon { font-size: 3rem; }
        .header h2 { color: #1f2937; margin-top: 0.5rem; }
        .header p { color: #6b7280; font-size: 0.9rem; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; color: #4b5563; font-weight: 500; margin-bottom: 0.4rem; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1rem; }
        .form-group input:focus { outline: none; border-color: #d97706; box-shadow: 0 0 0 3px rgba(217,119,6,0.2); }
        
        .terms { font-size: 0.85rem; color: #6b7280; margin-bottom: 1.5rem; display: flex; align-items: flex-start; gap: 8px; }

        .btn-submit { 
            width: 100%; padding: 0.75rem; background: #d97706; color: white; 
            border: none; border-radius: 0.5rem; font-size: 1rem; font-weight: bold; 
            cursor: pointer; transition: 0.3s; 
        }
        .btn-submit:hover { background: #b45309; }

        .footer-text { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: #4b5563; }
        .back-link { margin-bottom: 1.5rem; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← Back to Home</a>

    <div class="auth-container">
        <div class="header">
            <div class="icon">✨</div>
            <h2>Join the Library</h2>
            <p>Start your reading journey today.</p>
        </div>

        <form action="login.html">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Create Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            
            <div class="terms">
                <input type="checkbox" id="terms" required>
                <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
            </div>

            <button type="submit" class="btn-submit">Create Account</button>
        </form>

        <p class="footer-text">
            Already have an account? <a href="login.html">Sign In</a>
        </p>
    </div>

</body>
</html>
